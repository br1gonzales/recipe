title: "Lentejas"
steps:
  - "Remojar 250g a 500g de lentejas por 1 hora."
  - "Hacer 2 tazas de arroz."
  - "Picar 1 cebolla bien chiquitito."
  - "Agregar aceite a una olla grande y freir la cebolla."
  - "Añadir 1 cucharada de ají panka o bastante paprika."
  - "Picar y añadir 3 dientes de ajo."
  - "Agregar sal, pimienta, comino y orégano."
  - "Dejar que se cocine por unos minutos."
  - "Agregar 2 tomates cortado en cuadrados medianos."
  - "Añadir las lentejas crudas y tapar la olla."
  - "Mover a los 20 minutos. Si el agua consumio agregar un poco de agua y sal."
  - "Freír uno a dos huevos."
  - "Servir acompañado de ensalada de lechuga y cebolla."

title: "Arroz con Pollo con Huancaína"
steps:
  - "Filetear y condimentar filetes con pimienta, sal, comino y paprika."
  - "Sellar 4 filetes en la sarten y reservar el resto."
  - "Deshojar todo culantro y licuarlo."
  - "Picar en cuadraditos bien pequeños 1 pimiento, zanahoria, 1 cebolla y 3 dientes de ajo."
  - "Desgranar 1 choclo."
  - "Agregar aceite a una olla arrocera en modo sofrito bajo."
  - "Echar la cebolla y freír por unos minutos."
  - "Agregar una cucharada de ají panka."
  - "Añadir ajo picado y mover evitando que se queme."
  - "Echar sal, pimienta, comino y paprika."
  - "Sumar el culantro."
  - "Lavar 2 tazas y media de arroz y meterlos a la olla arrocera."
  - "Incorporar las verduras (zanahoria, pimiento y choclo)."
  - "Agregar sal."
  - "Lavar la licuadora y desinfectar utensilios que cortaron el pollo"
  - "Lavar 3 ajies y cortarlos por la mitad quitando la raiz."
  - "Sacar con una cucharita puntiaguda todas las venas y reservarlas."
  - "Cortar ajíes en trozos y echarlos a la licuadora."
  - "Agregar 250g de queso fresco."
  - "Echar ¾ de taza de leche en proporción de preparación de 3 unidades de leche evaporada por cada 4 unidades de agua."
  - "Agregar sal, pimienta y ¾ de galleta soda."
  - "Si la mezcla resulta aguada añadir mas queso o galletas."
  - "Agregar mas venas si para intensificar el picante inicial."
  - "Si la textura esta muy grumosa por el queso pero sigue medio líquida, agregar más galletas."
  - "Comprobar que sepa a salsa de aji con queso y no a galleta soda."
  - "Opcionalmente agregar un chorrito de aceite vegal para unificar la mezcla."
